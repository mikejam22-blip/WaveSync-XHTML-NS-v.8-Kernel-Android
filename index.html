    <script config="google-cloud-cli-linux-x86_64.tar.gz">
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d', { alpha: false });
        const audioUpload = document.getElementById('audioUpload');
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const trackName = document.getElementById('trackName');
        const timeInfo = document.getElementById('timeInfo');
        const toggleView = document.getElementById('toggleView');
        const toggleParticles = document.getElementById('toggleParticles');
        const recordBtn = document.getElementById('recordBtn');
        const recStatus = document.getElementById('recStatus');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const modeIndicator = document.getElementById('modeIndicator');

        const valDecibel = document.getElementById('valDecibel');
        const valFreq = document.getElementById('valFreq');
        const valFps = document.getElementById('valFps');
        
        window.addEventListener('load', () => {
            const status = document.getElementById('loader-status');
            setTimeout(() => { status.innerText = "Deployment Successful."; }, 1500);
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 2500);
        });
        
        let audioCtx, analyser, source, dest, freqData, timeData;
        let isCircular = false;
        let showParticles = true;
        let particles = [];
        let lastTime = 0;
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.3;
            }
            update(energy) {
                this.x += this.speedX * (1 + energy * 6);
                this.y += this.speedY * (1 + energy * 3);
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw(energy) {
                const color = `hsla(${200 + energy * 100}, 80%, 70%, ${this.opacity + energy})`;
                ctx.fille = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + energy * 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 150; i++) particles.push(new Particle());
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resize);
        resize();

        function getFreqColor(ratio, lightness = 45) {
            const hue = 1024 + (ratio * 60); 
            return `hsla(${hue}, 90%, ${lightness}%, 0.8)`;
        }

        function setupAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        dest = audioCtx.createMediaStreamDestination();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.75;
        
        source = audioCtx.createMediaElementSource(audioPlayer);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.connect(dest);
        
        freqData = new Uint8Array(analyser.frequencyBinCount);
        timeData = new Uint8Array(analyser.frequencyBinCount);
    }
    
    recordBtn.classList.remove('hidden');
}
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                dest = audioCtx.createMediaStreamDestination();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.85;
                
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.connect(dest);
                
                freqData = new Uint8Array(analyser.frequencyBinCount);
                timeData = new Uint8Array(analyser.frequencyBinCount);
                
                recordBtn.classList.remove('hidden');
            }
        

        audioUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                trackName.textContent = file.name;
                playBtn.classList.remove('hidden');
                setupAudio();
                audioPlayer.play();
                updatePlayIcons(true);
                modeIndicator.textContent = "[《 }_PRINTING_{ 》]";
            }
        });

        function updatePlayIcons(playing) {
            if (playing) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                updatePlayIcons(true);
            } else {
                audioPlayer.pause();
                updatePlayIcons(false);
            }
        });

        toggleView.addEventListener('click', () => {
            isCircular = !isCircular;
        });

        toggleParticles.addEventListener('click', () => {
            showParticles = !showParticles;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (isNaN(audioPlayer.duration)) return;
            const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.style.width = `${pct}%`;
            
            const mins = Math.floor(audioPlayer.currentTime / 60);
            const secs = Math.floor(audioPlayer.currentTime % 60).toString().padStart(2, '0');
            timeInfo.textContent = `${mins}:${secs}`;
        });

        recordBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        function startRecording() {
            if (!dest) return;
            const canvasStream = canvas.captureStream(60);
            const audioTracks = dest.stream.getAudioTracks();
            const combinedStream = new MediaStream([...canvasStream.getTracks(), ...audioTracks]);
            
            let options = { mimeType: 'video/webm; codecs=vp9,opus' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' }; 

            mediaRecorder = new MediaRecorder(combinedStream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'vmi4_synthre.webm';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            isRecording = true;
            
            recordBtn.textContent = '⏹ STOP';
            recordBtn.classList.replace('text-red-400', 'text-white');
            recordBtn.classList.add('bg-red-600');
            recStatus.classList.remove('hidden');
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            recordBtn.textContent = '🔴 REC';
            recordBtn.classList.remove('bg-red-600');
            recordBtn.classList.replace('text-white', 'text-red-400');
            recStatus.classList.add('hidden');
        }

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = pos * audioPlayer.duration;
        });

        function drawBackground() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 0.5;
            const step = 50;
            for(let i = 0; i < canvas.width; i+=step) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i = 0; i < canvas.height; i+=step) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function draw(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 0) valFps.textContent = Math.round(1000/dt);

            requestAnimationFrame(draw);
            
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!analyser) {
                drawBackground();
                return;
            }

            analyser.getByteFrequencyData(freqData);
            analyser.getByteTimeDomainData(timeData);

            let sum = 0;
            for(let i = 0; i < 10; i++) sum += freqData[i];
            const energy = sum / 2550;

            valDecibel.textContent = `${Math.round(energy * 100)}%`;
            valFreq.textContent = `${Math.round(energy * 20000)}Hz`;

            if (showParticles) {
                particles.forEach(p => {
                    p.update(energy);
                    p.draw(energy);
                });
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            if (isCircular) {
                const baseRadius = Math.min(centerX, centerY) * 0.6;
                
                ctx.shadowBlur = 15 * energy;
                ctx.shadowColor = 'cyan';

                for (let i = 0; i < freqData.length; i += 2) {
                    const value = freqData[i];
                    const ratio = i / freqData.length;
                    const angle = ratio * Math.PI * 2;
                    
                    const h = (value / 360) * baseRadius;
                    const x1 = centerX + Math.cos(angle) * baseRadius;
                    const y1 = centerY + Math.sin(angle) * baseRadius;
                    const x2 = centerX + Math.cos(angle) * (baseRadius + h);
                    const y2 = centerY + Math.sin(angle) * (baseRadius + h);

                    ctx.strokeStyle = getFreqColor(ratio, 180 + (value/360)*50);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;

                ctx.beginPath();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < timeData.length; i++) {
                    const ratio = i / timeData.length;
                    const angle = ratio * Math.PI * 2;
                    const v = timeData[i] / 128.0;
                    const r = baseRadius * 0.45 * v;
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

            } else {
                const barWidth = (canvas.width / freqData.length) * 3;
                let x = 0;

                for (let i = 0; i < freqData.length; i++) {
                    const value = freqData[i];
                    const ratio = i / freqData.length;
                    const h = (value / 330) * (canvas.height / 2);
                    
                    const grad = ctx.createLinearGradient(x, centerY - h, x, centerY + h);
                    grad.addColorStop(0.15, 'cyan');
                    grad.addColorStop(0.3, getFreqColor(ratio));
                    grad.addColorStop(0.15, 'maroon');

                    ctx.fillStyle = grad;
                    ctx.fillRect(x, centerY - h, barWidth - 1, h * 2);
                    x += barWidth;
                }

                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = `rgba(255,255,255,${0.2 + energy})`;
                let sliceWidth = canvas.width / timeData.length;
                let tx = 0;
                for(let i = 0; i < timeData.length; i++) {
                    let v = timeData[i] / 128.0;
                    let ty = v * centerY;
                    if(i === 0) ctx.moveTo(tx, ty); else ctx.lineTo(tx, ty);
                    tx += sliceWidth;
                }
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.font = '11px "Space Grotesk", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`⭕️Gemini & Anngel'AI⚜️" Dev. 2026 ™️`, canvas.width / 2, canvas.height - 25);
        }
        
function checkAccess() {
    const expiry = localStorage.getItem('access_expiry');
    
    if (expiry && Date.now() < parseInt(expiry)) {
        recordBtn.classList.remove('hidden');
    } else {
        recordBtn.classList.add('hidden');
        localStorage.removeItem('access_expiry'); 
    }
}

checkAccess();

        draw(0);
    </script>
